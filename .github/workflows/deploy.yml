name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NUXT_PUBLIC_API_BASE: https://api.fatejyc.com/api
      NUXT_PUBLIC_WS_ANALYZE_URL: wss://api.fatejyc.com/ws/analyze
      NUXT_PUBLIC_GOOGLE_WEB_CLIENT_ID: 670031557422-b9s1vea1r2kf2s1o8eag3pk43sf4c727.apps.googleusercontent.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build with Nuxt
        run: npm run generate

      - name: Verify PWA precache URLs
        run: npm run verify:pwa

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
